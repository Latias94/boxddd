name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi
          if [[ "$release_tag" != v* ]]; then
            echo "::error::Release tag '$release_tag' must start with v."
            exit 1
          fi
          version="${release_tag#v}"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Verify Cargo workspace version matches tag
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')"
          if [ "$cargo_version" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Cargo workspace version '$cargo_version' does not match tag ${{ steps.tag.outputs.version }}"
            exit 1
          fi

      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/changelog.py check-soft-wrap \
            --version "${{ steps.tag.outputs.version }}"
          python3 tools/changelog.py extract \
            --version "${{ steps.tag.outputs.version }}" \
            --output release-notes.md
          test -s release-notes.md

      - name: Create or update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md
          make_latest: true
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
