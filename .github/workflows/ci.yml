name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-Cdebuginfo=0"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Check formatting
        run: cargo fmt --all --check

  native:
    name: Native build and tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install Linux native deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            libxxf86vm-dev \
            mesa-common-dev \
            pkg-config

      - name: Run workspace tests
        run: cargo nextest run --workspace

      - name: Check double precision sys ABI
        run: cargo check -p boxddd-sys --features double-precision

      - name: Run double precision layout tests
        run: cargo nextest run -p boxddd-sys --features double-precision --test layout

  examples:
    name: Examples (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install Bevy Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            libxxf86vm-dev \
            mesa-common-dev \
            pkg-config

      - name: Check core examples
        run: cargo check -p boxddd --examples

      - name: Check Bevy plugin library
        run: cargo check -p bevy_boxddd --no-default-features

      - name: Check Bevy examples
        run: cargo check -p bevy_boxddd --examples

      - name: Check debug draw overlay example
        run: cargo check -p bevy_boxddd --features debug-gizmos --example debug_draw_overlay_3d

      - name: Check physics picking example
        run: cargo check -p bevy_boxddd --features physics-picking --example physics_picking_3d

      - name: Check Bevy testbed example
        run: cargo check -p bevy_boxddd --features "debug-gizmos physics-picking" --example testbed_3d

  docs-and-features:
    name: Docs and feature matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install Linux native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            libxxf86vm-dev \
            mesa-common-dev \
            pkg-config

      - name: Check workspace docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Check boxddd-sys docs.rs path
        run: cargo doc -p boxddd-sys --no-deps --no-default-features
        env:
          DOCS_RS: "1"
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"

      - name: Check boxddd docs.rs path
        run: cargo doc -p boxddd --no-deps
        env:
          DOCS_RS: "1"
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"

      - name: Check bevy_boxddd docs.rs path
        run: cargo doc -p bevy_boxddd --no-deps
        env:
          DOCS_RS: "1"
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"

      - name: Check no-default feature paths
        run: |
          cargo check -p boxddd --no-default-features
          cargo check -p boxddd-sys --no-default-features

      - name: Check sys crate without native C build
        run: cargo check -p boxddd-sys
        env:
          BOXDDD_SYS_SKIP_CC: "1"

      - name: Check core feature flags
        run: |
          cargo check -p boxddd --features validate
          cargo check -p boxddd --features disable-simd
          cargo check -p boxddd --features double-precision
          cargo check -p boxddd --features serde
          cargo check -p boxddd --features mint
          cargo check -p boxddd --features glam
          cargo check -p boxddd --features nalgebra
          cargo check -p boxddd --features cgmath

      - name: Run feature interop tests
        run: |
          cargo test -p boxddd --features serde --test serde_values
          cargo test -p boxddd --features mint --test interop
          cargo test -p boxddd --features glam --test interop
          cargo test -p boxddd --features nalgebra --test interop
          cargo test -p boxddd --features cgmath --test interop
          cargo run -p boxddd --example mint_interop --features mint

  all-features:
    name: All features (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install Linux native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            libxxf86vm-dev \
            mesa-common-dev \
            pkg-config

      - name: Check all-feature build surfaces
        run: |
          cargo check -p boxddd --all-features --tests --examples
          cargo check -p bevy_boxddd --all-features --tests --examples

      - name: Run all-feature tests
        run: cargo nextest run --workspace --all-features

  package-and-bindings:
    name: Package and bindgen refresh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install LLVM for bindgen
        uses: KyleMayes/install-llvm-action@v2
        with:
          cached: true
          version: "14.0"

      - name: Package crates
        run: |
          cargo package -p boxddd-sys
          cargo package -p boxddd --config 'patch.crates-io.boxddd-sys.path="boxddd-sys"'
          cargo package -p bevy_boxddd --config 'patch.crates-io.boxddd.path="boxddd"' --config 'patch.crates-io.boxddd-sys.path="boxddd-sys"'

      - name: Audit package contents
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo pkgid -p boxddd | sed -E 's/.*[@#]//')"
          sys_crate="target/package/boxddd-sys-${version}.crate"
          core_crate="target/package/boxddd-${version}.crate"
          bevy_crate="target/package/bevy_boxddd-${version}.crate"

          for crate in "$sys_crate" "$core_crate" "$bevy_crate"; do
            list="${crate}.list"
            tar -tf "$crate" | tee "$list" >/dev/null
            if grep -E '(^|/)(repo-ref|target|\.github)(/|$)|(^|/)docs/plans/' "$list"; then
              echo "::error::$crate contains non-publishable workspace content"
              exit 1
            fi
          done

          tar -tf "$sys_crate" | grep -F '/third-party/box3d/LICENSE'
          tar -tf "$core_crate" | grep -F '/tests/fixtures/api_coverage_symbols.txt'
          tar -tf "$core_crate" | grep -F '/examples/dynamic_tree.rs'
          tar -tf "$bevy_crate" | grep -F '/examples/testbed_3d/main.rs'

      - name: Check forced bindgen path
        run: cargo check -p boxddd-sys --features bindgen
        env:
          BOXDDD_SYS_FORCE_BINDGEN: "1"

      - name: Check forced bindgen double precision path
        run: cargo check -p boxddd-sys --features "bindgen double-precision"
        env:
          BOXDDD_SYS_FORCE_BINDGEN: "1"

  sys-bindgen-defaults:
    name: Sys crate default binding path
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Assert default sys crate does not pull bindgen
        shell: bash
        run: |
          set -euo pipefail
          for dep in bindgen clang-sys; do
            out="$(mktemp)"
            if cargo tree -p boxddd-sys --target all -i "$dep" >"$out" 2>&1; then
              cat "$out"
              echo "::error::boxddd-sys unexpectedly depends on $dep by default"
              exit 1
            fi
            if ! grep -q "did not match any packages" "$out"; then
              cat "$out"
              echo "::error::cargo tree failed unexpectedly while checking boxddd-sys for $dep"
              exit 1
            fi
          done

      - name: Check sys crate without libclang or native C
        run: cargo check -p boxddd-sys
        env:
          LIBCLANG_PATH: ${{ github.workspace }}/ci-missing-libclang
          BOXDDD_SYS_SKIP_CC: "1"

      - name: Assert forced regeneration requires bindgen feature
        shell: bash
        env:
          LIBCLANG_PATH: ${{ github.workspace }}/ci-missing-libclang
          BOXDDD_SYS_FORCE_BINDGEN: "1"
        run: |
          set -euo pipefail
          set +e
          cargo check -p boxddd-sys >regen-without-bindgen.log 2>&1
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            cat regen-without-bindgen.log
            echo "::error::binding regeneration unexpectedly succeeded without the bindgen feature"
            exit 1
          fi
          grep -F 'BOXDDD_SYS_FORCE_BINDGEN=1 requires the `bindgen` feature' regen-without-bindgen.log

  windows-gnu:
    name: Windows GNU link check
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Setup MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-x86_64-toolchain

      - name: Add MinGW64 to PATH
        shell: powershell
        run: |
          $root = '${{ steps.msys2.outputs.msys2-location }}'
          $mingw = Join-Path $root 'mingw64\bin'
          echo $mingw >> $env:GITHUB_PATH
          echo "MINGW_BIN=$mingw" >> $env:GITHUB_ENV

      - name: Add windows-gnu target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Link boxddd-sys tests for windows-gnu
        run: cargo test -p boxddd-sys --target x86_64-pc-windows-gnu --no-run
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: '${{ env.MINGW_BIN }}\gcc.exe'
          CC_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\gcc.exe'
          CXX_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\g++.exe'
          AR_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\ar.exe'

      - name: Type-check core wrapper for windows-gnu
        run: cargo check -p boxddd --target x86_64-pc-windows-gnu
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: '${{ env.MINGW_BIN }}\gcc.exe'
          CC_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\gcc.exe'
          CXX_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\g++.exe'
          AR_x86_64_pc_windows_gnu: '${{ env.MINGW_BIN }}\ar.exe'

  cross-typecheck:
    name: Cross target type-check (armv7)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Type-check pregenerated bindings on armv7
        run: cargo check -p boxddd-sys -p boxddd --target armv7-unknown-linux-gnueabihf
        env:
          BOXDDD_SYS_SKIP_CC: "1"

  mobile-typecheck:
    name: Mobile target type-check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-ios
          - os: macos-15
            target: aarch64-apple-ios-sim
          - os: ubuntu-latest
            target: aarch64-linux-android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Add mobile target
        run: rustup target add ${{ matrix.target }}

      - name: Type-check safe wrapper on mobile target
        run: cargo check -p boxddd-sys -p boxddd --target ${{ matrix.target }}
        env:
          BOXDDD_SYS_SKIP_CC: "1"

  wasm:
    name: WASM compile-only matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Check boxddd-sys wasm compile-only path
        run: cargo check -p boxddd-sys --target wasm32-unknown-unknown

      - name: Check boxddd wasm compile-only path
        run: cargo check -p boxddd --target wasm32-unknown-unknown

      - name: Check boxddd wasm provider import path
        run: cargo check -p boxddd --target wasm32-unknown-unknown
        env:
          BOXDDD_SYS_WASM_MODE: provider

      - name: Check minimal bevy_boxddd wasm compile-only path
        run: cargo check -p bevy_boxddd --target wasm32-unknown-unknown --no-default-features

  wasm-provider:
    name: WASM provider smoke
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: "4.0.22"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install Emscripten SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${EMSDK_VERSION}" https://github.com/emscripten-core/emsdk.git "${RUNNER_TEMP}/emsdk"
          "${RUNNER_TEMP}/emsdk/emsdk" install "${EMSDK_VERSION}"
          "${RUNNER_TEMP}/emsdk/emsdk" activate "${EMSDK_VERSION}"
          echo "EMSDK=${RUNNER_TEMP}/emsdk" >> "$GITHUB_ENV"
          echo "${RUNNER_TEMP}/emsdk" >> "$GITHUB_PATH"
          echo "${RUNNER_TEMP}/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Check Node runtime
        run: node --version

      - name: Run browser-style provider smoke
        run: cargo run -p xtask -- provider-smoke

  wasm-runtime:
    name: WASM runtime smoke (WASI)
    runs-on: ubuntu-latest
    env:
      WASI_SDK_VERSION: "33"
      WASI_SDK_VERSION_FULL: "33.0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: "false"

      - name: Install WASI SDK
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            -o wasi-sdk.tar.gz \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION_FULL}-x86_64-linux.tar.gz"
          tar -xzf wasi-sdk.tar.gz
          wasi_sdk_path="$PWD/wasi-sdk-${WASI_SDK_VERSION_FULL}-x86_64-linux"
          echo "WASI_SDK_PATH=${wasi_sdk_path}" >> "$GITHUB_ENV"
          echo "WASI_SYSROOT=${wasi_sdk_path}/share/wasi-sysroot" >> "$GITHUB_ENV"
          echo "${wasi_sdk_path}/bin" >> "$GITHUB_PATH"

      - name: Build C-backed WASM smoke
        run: cargo build -p boxddd --example wasm_smoke --target wasm32-wasip1
        env:
          CC_wasm32_wasip1: clang

      - name: Run C-backed WASM smoke
        run: wasmtime target/wasm32-wasip1/debug/examples/wasm_smoke.wasm
