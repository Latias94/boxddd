name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-Cdebuginfo=0"

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - run: cargo nextest run --workspace

  examples:
    name: examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Bevy Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            libxxf86vm-dev \
            mesa-common-dev \
            pkg-config
      - run: cargo check -p boxddd --examples
      - run: cargo check -p bevy_boxddd --no-default-features
      - run: cargo check -p bevy_boxddd --examples
      - run: cargo check -p bevy_boxddd --features debug-gizmos --example debug_draw_overlay_3d
      - run: cargo check -p bevy_boxddd --features physics-picking --example physics_picking_3d
      - run: cargo check -p bevy_boxddd --features "debug-gizmos physics-picking" --example testbed_3d

  docs-and-features:
    name: docs and feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - run: DOCS_RS=1 RUSTDOCFLAGS="--cfg docsrs -D warnings" cargo doc -p boxddd --no-deps
      - run: DOCS_RS=1 RUSTDOCFLAGS="--cfg docsrs -D warnings" cargo doc -p bevy_boxddd --no-deps
      - run: cargo check -p boxddd --no-default-features
      - run: cargo check -p boxddd-sys --no-default-features
      - run: BOXDDD_SYS_SKIP_CC=1 cargo check -p boxddd-sys
      - run: cargo check -p boxddd --features validate
      - run: cargo check -p boxddd --features disable-simd
      - run: cargo check -p boxddd --features double-precision
      - run: cargo nextest run -p boxddd-sys --features double-precision --test layout
      - run: cargo check -p boxddd --features serde
      - run: cargo check -p boxddd --features mint
      - run: cargo check -p boxddd --features glam
      - run: cargo check -p boxddd --features nalgebra
      - run: cargo check -p boxddd --features cgmath
      - run: cargo check -p boxddd --all-features --tests --examples
      - run: cargo check -p boxddd-sys --target wasm32-unknown-unknown
      - run: cargo check -p boxddd --target wasm32-unknown-unknown
      - run: cargo check -p bevy_boxddd --target wasm32-unknown-unknown --no-default-features
      - run: cargo test -p boxddd --features serde --test serde_values
      - run: cargo test -p boxddd --features mint --test interop
      - run: cargo test -p boxddd --features glam --test interop
      - run: cargo test -p boxddd --features nalgebra --test interop
      - run: cargo test -p boxddd --features cgmath --test interop
      - run: cargo run -p boxddd --example mint_interop --features mint

  package-and-bindings:
    name: package and bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo package -p boxddd-sys
      - run: cargo package -p boxddd --config 'patch.crates-io.boxddd-sys.path="boxddd-sys"'
      - run: cargo package -p bevy_boxddd --config 'patch.crates-io.boxddd.path="boxddd"' --config 'patch.crates-io.boxddd-sys.path="boxddd-sys"'
      - run: BOXDDD_SYS_FORCE_BINDGEN=1 cargo check -p boxddd-sys --features bindgen
      - run: BOXDDD_SYS_FORCE_BINDGEN=1 cargo check -p boxddd-sys --features "bindgen double-precision"
