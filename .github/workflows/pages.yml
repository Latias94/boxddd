name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/pages/**"
      - "examples-wasm/**"
      - "xtask/**"
      - "bevy_boxddd/**"
      - "boxddd/**"
      - "boxddd-sys/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and upload static site
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: "4.0.22"
    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-bin: "false"

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install Emscripten SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${EMSDK_VERSION}" https://github.com/emscripten-core/emsdk.git "${RUNNER_TEMP}/emsdk"
          "${RUNNER_TEMP}/emsdk/emsdk" install "${EMSDK_VERSION}"
          "${RUNNER_TEMP}/emsdk/emsdk" activate "${EMSDK_VERSION}"
          echo "EMSDK=${RUNNER_TEMP}/emsdk" >> "$GITHUB_ENV"
          echo "${RUNNER_TEMP}/emsdk" >> "$GITHUB_PATH"
          echo "${RUNNER_TEMP}/emsdk/upstream/emscripten" >> "$GITHUB_PATH"
          echo "${RUNNER_TEMP}/emsdk/upstream/bin" >> "$GITHUB_PATH"

      - name: Build Pages WASM demo assets
        run: cargo run -p xtask -- build-pages-wasm

      - name: Validate Pages content
        run: cargo run -p xtask -- validate-pages

      - name: Check GitHub Pages configuration
        id: pages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          status="$(curl -sS -o pages-response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")"

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "::warning::GitHub Pages is not enabled for this repository or the workflow token cannot read it. Static validation passed; enable Pages with GitHub Actions as the source to deploy docs/pages."

      - name: Configure GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/pages

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main' && needs.build.outputs.pages_enabled == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
